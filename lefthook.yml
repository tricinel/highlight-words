pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    format:
      glob: '*.{js,ts,json,md,yml,yaml}'
      run: pnpm -s exec oxfmt --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    lint:
      glob: '*.{js,ts}'
      run: pnpm -s exec oxlint -c .oxlintrc.json --fix {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.ts'
      run: npx tsc-files --noEmit

pre-push:
  commands:
    test:
      run: npm run test
